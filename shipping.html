<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping | Aotearoa Adventure Gear</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/custom-home.css">
  <link rel="stylesheet" href="css/custom-shipping.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success py-3">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Aotearoa Adventure Gear</a>
    <div class="ms-auto">
      <a href="cart.html" class="nav-link text-white">Cart</a>
    </div>
  </div>
</nav>

<!-- HEADER -->
<header class="shipping-header text-white text-center py-5">
  <div class="container">
    <h1>Shipping Details</h1>
    <p>Enter your delivery information</p>
  </div>
</header>

<!-- FORM -->
<section class="py-5">
  <div class="container">
    <div class="row">

      <!-- LEFT FORM -->
      <div class="col-md-7">
        <form id="shippingForm">

          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Address</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>City</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Postcode</label>
            <input type="text" class="form-control" required>
          </div>

          <a href="payment.html" class="btn btn-success mt-3">Continue to Payment</a>

        </form>
      </div>

      <!-- RIGHT SUMMARY -->
      <div class="col-md-5">
        <div class="summary-box p-4 shadow rounded">

          <h4>Order Summary</h4>
          <hr>

          <p>Subtotal: <span id="subtotal">$500</span></p>
          <p>Shipping: <span id="shippingCost">$20</span></p>

          <h5>Total: <span id="total">$520</span></h5>

          <p id="shippingMessage" class="mt-3 text-success fw-bold"></p>

        </div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">
  <p>&copy; 2026 Aotearoa Adventure Gear</p>
</footer>

<script src="js/main.js"></script>
</body>
</html>
